<div class="w-full h-full block">
  <div class="p-1 flex items-center gap-1 justify-start border-b border-[#E2E8F0] h-9">
    @for (request of requests; track $index) {
      <div
        class="group text-xs ps-3 pe-1 h-full hover:bg-[#E2E8F0] rounded flex items-center gap-2 cursor-pointer transition-all duration-200"
        [class]="request.active ? 'bg-[#E2E8F0]' : 'bg-none'"
        (click)="activeRequest(request.id)"
        (keypress)="activeRequest(request.id)"
      >
        {{ request.name }}
        <button
          (click)="removeRequest(request.id)"
          class="flex items-center justify-center cursor-pointer h-5 w-5 rounded opacity-0 pointer-events-none group-hover:opacity-100 group-hover:pointer-events-auto transition-opacity duration-200"
        >
          <i class="ph-bold ph-x"></i>
        </button>
      </div>
    }
    <button
      (click)="newRequest()"
      class="hover:bg-[#E2E8F0] rounded flex items-center justify-center cursor-pointer transition-all duration-200 h-7 w-7"
    >
      <i class="ph-bold ph-plus"></i>
    </button>
  </div>
  @if (requests.length > 0) {
    <div class="flex items-center gap-2 p-3 border-b border-[#E2E8F0]">
      <select
        id="request-method"
        class="h-8 px-2 rounded border border-[#CBD5E1] bg-white text-xs font-semibold text-[#0F172A] outline-none focus:border-[#2563EB]"
        [value]="activeRequestInfo?.method ?? 'GET'"
        (change)="changeActiveRequestMethod($event)"
      >
        @for (method of httpMethods; track method) {
          <option [value]="method">{{ method }}</option>
        }
      </select>
    </div>
    <div class="p-4">
      <h3 class="text-sm font-bold text-[#1E293B] mb-2">Request Details</h3>
      <p class="text-sm text-[#334155]">Here you can edit the details of the selected request.</p>
    </div>
  }
</div>
